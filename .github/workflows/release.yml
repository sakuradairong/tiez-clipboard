name: "Publish Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc --bundles nsis'
          - name: Linux x64
            platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: '--target x86_64-unknown-linux-gnu --bundles deb,appimage'
          - name: macOS Apple Silicon
            platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin --bundles app,dmg'
          - name: macOS Intel
            platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin --bundles app,dmg'

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false

      - name: install dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            xdg-utils

      - name: install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.rust_target }}

      - name: install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_ENABLE_UPDATER: "true"
        with:
          tagName: v__VERSION__
          releaseName: "TieZ v__VERSION__"
          releaseBody: |
            Multi-platform release from the maintained TieZ community fork.

            Available for Windows x64, Linux x64, macOS Apple Silicon and macOS Intel.
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
